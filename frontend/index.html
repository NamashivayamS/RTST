<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iSpeak Global - Real-Time Speech Translation</title>
  <link rel="icon" type="image/png" href="/static/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Noto+Serif+Tamil:wght@300;400;600&family=JetBrains+Mono:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #050608;
      --surface: #0d0f14;
      --surface2: #13161e;
      --border: #1a1f2e;
      --border2: #242938;
      --accent: #00d4ff;
      --accent-dim: rgba(0, 212, 255, 0.12);
      --accent-glow: rgba(0, 212, 255, 0.3);
      --green: #00ff9d;
      --green-dim: rgba(0, 255, 157, 0.1);
      --green-glow: rgba(0, 255, 157, 0.35);
      --tamil: #bf7fff;
      --tamil-dim: rgba(191, 127, 255, 0.12);
      --english: #00d4ff;
      --english-dim: rgba(0, 212, 255, 0.12);
      --danger: #ff4d6d;
      --danger-dim: rgba(255, 77, 109, 0.12);
      --warn: #ffaa00;
      --text: #c8d0e8;
      --text-bright: #eef1f8;
      --muted: #3d4460;
      --muted2: #5a6280;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
      --tamil-font: 'Noto Serif Tamil', serif;
      --radius: 8px;
      --radius-lg: 14px;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      overflow: hidden;
    }

    /* ── Scanline overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg,
          transparent,
          transparent 2px,
          rgba(0, 0, 0, 0.03) 2px,
          rgba(0, 0, 0, 0.03) 4px);
      pointer-events: none;
      z-index: 9000;
    }

    /* ── Grid lines background ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout ── */
    .app {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto auto auto;
      height: 100vh;
      max-width: 920px;
      margin: 0 auto;
      padding: 0 28px;
    }

    /* ── Header ── */
    header {
      padding: 22px 0 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      flex-shrink: 0;
    }

    .logo-mark svg {
      width: 18px;
      height: 18px;
      stroke: var(--accent);
      fill: none;
      stroke-width: 1.5;
    }

    .logo-text .name {
      font-family: var(--sans);
      font-weight: 600;
      font-size: 16px;
      color: var(--text-bright);
      letter-spacing: -0.02em;
    }

    .logo-text .tagline {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 1px;
    }

    .header-stats {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .stat-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.06em;
    }

    .stat-pill .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: all 0.4s;
      flex-shrink: 0;
    }

    .stat-pill .dot.alive {
      background: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
    }

    .stat-pill .dot.rec {
      background: var(--danger);
      box-shadow: 0 0 6px rgba(255, 77, 109, 0.5);
      animation: blink 0.8s ease-in-out infinite;
    }

    .stat-pill .dot.proc {
      background: var(--warn);
      box-shadow: 0 0 6px rgba(255, 170, 0, 0.4);
      animation: blink 0.4s ease-in-out infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.2
      }
    }

    .lang-select {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 8px;
      font-family: var(--mono);
      font-size: 11px;
      outline: none;
      cursor: pointer;
    }

    /* ── Subtitle panel ── */
    .subtitle-panel {
      display: flex;
      flex-direction: column;
      padding: 24px 0 16px;
      gap: 12px;
      overflow-y: auto;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    .subtitle-panel::before {
      content: "";
      margin-top: auto;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--muted);
      text-align: center;
    }

    .empty-state .idle-viz {
      display: flex;
      align-items: center;
      gap: 3px;
      height: 32px;
    }

    .idle-bar {
      width: 3px;
      border-radius: 2px;
      background: var(--border2);
      animation: idleBar 1.4s ease-in-out infinite;
    }

    .idle-bar:nth-child(1) {
      height: 8px;
      animation-delay: 0s;
    }

    .idle-bar:nth-child(2) {
      height: 14px;
      animation-delay: 0.1s;
    }

    .idle-bar:nth-child(3) {
      height: 20px;
      animation-delay: 0.2s;
    }

    .idle-bar:nth-child(4) {
      height: 26px;
      animation-delay: 0.3s;
    }

    .idle-bar:nth-child(5) {
      height: 20px;
      animation-delay: 0.4s;
    }

    .idle-bar:nth-child(6) {
      height: 14px;
      animation-delay: 0.5s;
    }

    .idle-bar:nth-child(7) {
      height: 8px;
      animation-delay: 0.6s;
    }

    @keyframes idleBar {

      0%,
      100% {
        opacity: 0.2;
        transform: scaleY(1);
      }

      50% {
        opacity: 0.5;
        transform: scaleY(1.3);
      }
    }

    .empty-state .hint {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    /* ── Utterance card ── */
    .utterance {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 14px 18px;
      display: grid;
      grid-template-columns: 2px 1fr;
      gap: 0 14px;
      animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .utterance .bar {
      border-radius: 2px;
      background: var(--muted);
      grid-row: 1/3;
      align-self: stretch;
    }

    .utterance .bar.ta {
      background: var(--tamil);
      box-shadow: 0 0 8px rgba(191, 127, 255, 0.4);
    }

    .utterance .bar.en {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }

    .utterance-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 7px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.06em;
    }

    .lang-badge {
      padding: 2px 8px;
      border-radius: 3px;
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .lang-badge.ta {
      background: var(--tamil-dim);
      color: var(--tamil);
      border: 1px solid rgba(191, 127, 255, 0.2);
    }

    .lang-badge.en {
      background: var(--english-dim);
      color: var(--english);
      border: 1px solid rgba(0, 212, 255, 0.2);
    }

    .utterance-arrow {
      color: var(--muted);
      font-size: 10px;
    }

    .utterance-time {
      margin-left: auto;
      font-size: 10px;
      color: var(--muted);
    }

    .utterance-text {
      font-size: 20px;
      line-height: 1.6;
      color: var(--text-bright);
      font-weight: 300;
    }

    .utterance-text.ta {
      font-family: var(--tamil-font);
    }

    .utterance-text.en {
      font-family: var(--sans);
      font-style: italic;
    }

    .utterance.active .utterance-text::after {
      content: '|';
      opacity: 0.6;
      animation: blink 0.8s step-end infinite;
      margin-left: 2px;
      font-weight: 300;
    }

    .chunk-token {
      display: inline;
      animation: tokenReveal 0.18s ease;
    }

    @keyframes tokenReveal {
      from {
        opacity: 0;
        transform: translateY(3px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── ECG Waveform ── */
    .ecg-section {
      border-top: 1px solid var(--border);
      padding: 12px 0 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .ecg-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      writing-mode: horizontal-tb;
      white-space: nowrap;
      flex-shrink: 0;
      width: 32px;
      text-align: right;
    }

    .ecg-wrapper {
      flex: 1;
      position: relative;
      height: 56px;
      border-radius: 6px;
      overflow: hidden;
      background: var(--surface);
      border: 1px solid var(--border);
    }

    canvas#ecg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    /* ECG center line */
    .ecg-wrapper::before {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      top: 50%;
      height: 1px;
      background: var(--border2);
      pointer-events: none;
      z-index: 1;
    }

    .ecg-stats {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex-shrink: 0;
      width: 56px;
    }

    .ecg-stat {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted2);
      letter-spacing: 0.04em;
    }

    .ecg-stat span {
      color: var(--green);
      font-size: 10px;
    }

    .ecg-stat.silent span {
      color: var(--muted);
    }

    /* ── Controls ── */
    .controls {
      border-top: 1px solid var(--border);
      padding: 16px 0 20px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .btn-record {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 1.5px solid var(--accent);
      background: var(--accent-dim);
      color: var(--accent);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s;
      flex-shrink: 0;
      position: relative;
    }

    .btn-record::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .btn-record:hover::after {
      opacity: 0.3;
    }

    .btn-record:hover {
      background: rgba(0, 212, 255, 0.18);
    }

    .btn-record.recording {
      border-color: var(--danger);
      background: var(--danger-dim);
      color: var(--danger);
    }

    .btn-record.recording::after {
      border-color: var(--danger);
      animation: recordPulse 1.4s ease-out infinite;
    }

    @keyframes recordPulse {
      0% {
        inset: -4px;
        opacity: 0.6;
      }

      100% {
        inset: -14px;
        opacity: 0;
      }
    }

    .btn-record:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      animation: none;
    }

    .btn-record:disabled::after {
      display: none;
    }

    .glow-orb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 10px var(--accent-glow);
      transition: all 0.3s ease;
    }

    .btn-record.recording .glow-orb {
      background: var(--danger);
      box-shadow: 0 0 15px var(--danger), 0 0 30px rgba(255, 77, 109, 0.6);
      animation: orbBreathe 1.2s ease-in-out infinite alternate;
    }

    @keyframes orbBreathe {
      from { transform: scale(0.85); opacity: 0.85; }
      to { transform: scale(1.3); opacity: 1; }
    }

    /* Dual Subtitle Source Text */
    .utterance-source {
      font-size: 13.5px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-style: italic;
      font-family: inherit;
      line-height: 1.4;
      opacity: 0.8;
    }

    /* Suggest Edit Button */
    .btn-report {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 4px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: all 0.2s;
      margin-left: auto;
      opacity: 0;
    }
    .utterance:hover .btn-report {
      opacity: 0.6;
    }
    .btn-report:hover {
      opacity: 1 !important;
      color: var(--accent);
      background: rgba(0, 212, 255, 0.1);
    }

    /* Slide-down Inline Feedback Form */
    .report-form-container {
      margin-top: 10px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.03);
      border-left: 3px solid var(--danger);
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: slideDown 0.2s ease-out;
    }

    .report-actions {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }

    .report-input {
      background: rgba(0,0,0,0.2);
      border: 1px solid rgba(255,255,255,0.1);
      color: white;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 12px;
      width: 100%;
    }

    .btn-submit-report {
      background: var(--danger);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
    }

    .btn-cancel-report {
      background: rgba(255,255,255,0.1);
      color: white;
      border: none;
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
    }
    
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .info-col {
      flex: 1;
      min-width: 0;
    }

    .info-primary {
      font-size: 13px;
      color: var(--text-bright);
      font-weight: 500;
      margin-bottom: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .info-secondary {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.04em;
    }

    .controls-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .audio-indicator {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      display: flex;
      align-items: center;
      gap: 5px;
      min-width: 80px;
      justify-content: flex-end;
    }

    .audio-indicator.playing {
      color: var(--accent);
    }

    .audio-indicator .play-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent-glow);
      animation: blink 0.6s ease-in-out infinite;
      display: none;
    }

    .audio-indicator.playing .play-dot {
      display: block;
    }

    .btn-clear {
      background: transparent;
      border: 1px solid var(--border2);
      color: var(--muted2);
      border-radius: var(--radius);
      padding: 7px 13px;
      font-family: var(--mono);
      font-size: 10px;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .btn-clear:hover {
      border-color: var(--muted2);
      color: var(--text);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 96px;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--surface2);
      border: 1px solid var(--danger);
      color: var(--danger);
      padding: 9px 18px;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.04em;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s;
      z-index: 100;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 0 20px rgba(255, 77, 109, 0.2);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Session Stats Bar ── */
    .session-stats {
      display: flex;
      align-items: center;
      gap: 0;
      border-top: 1px solid var(--border);
      padding: 6px 0 4px;
    }

    .stat-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 16px;
      border-right: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted2);
      letter-spacing: 0.04em;
    }

    .stat-item:first-child { padding-left: 0; }
    .stat-item:last-child  { border-right: none; }

    .stat-item .stat-val {
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      min-width: 24px;
      text-align: right;
    }

    .stat-item .stat-val.good  { color: var(--green); }
    .stat-item .stat-val.warn  { color: var(--warn); }

    /* ── Utterance badge row (confidence + latency) ── */
    .utt-badges {
      display: flex;
      align-items: center;
      gap: 5px;
      margin-top: 6px;
    }

    .utt-badge {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.05em;
      padding: 2px 7px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .utt-badge.conf-high { background: var(--green-dim); color: var(--green); border: 1px solid rgba(0,255,157,0.15); }
    .utt-badge.conf-mid  { background: var(--gold-dim);  color: var(--warn);  border: 1px solid rgba(255,170,0,0.15); }
    .utt-badge.conf-low  { background: var(--danger-dim);color: var(--danger);border: 1px solid rgba(255,77,109,0.15); }

    .utt-badge.latency   { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(0,212,255,0.15); }

    /* ── Mobile Responsiveness ── */
    @media (max-width: 600px) {
      .app {
        padding: 0 16px;
      }

      header {
        flex-wrap: wrap;
        padding: 16px 0 12px;
      }

      .logo-text .tagline {
        display: none;
      }

      .header-stats {
        margin-left: 0;
        width: 100%;
        margin-top: 8px;
        justify-content: flex-start;
      }

      .subtitle-panel {
        padding: 12px 0;
      }

      .utterance {
        padding: 12px;
        gap: 0 10px;
      }

      .utterance-text {
        font-size: 16px;
      }

      .ecg-label {
        display: none;
      }

      .ecg-stats {
        display: none;
      }

      .controls {
        flex-wrap: wrap;
        padding: 12px 0 16px;
      }

      .info-col {
        flex-basis: 100%;
        order: 3;
        margin-top: 8px;
      }

      .controls-right {
        margin-left: auto;
      }

      .session-stats {
        flex-wrap: wrap;
        gap: 4px;
        padding: 8px 0;
      }

      .stat-item {
        padding: 0 10px;
        font-size: 9px;
      }
    }
  </style>
</head>

<body>

  <div class="app">

    <!-- ── Header ── -->
    <header>
      <div class="logo-mark">
        <img src="/static/logo.png" alt="iSpeak Global Logo" style="height: 100%; width: auto; object-fit: contain;" />
      </div>
      <div class="logo-text">
        <div class="name">iSpeak Global</div>
        <div class="tagline">Indic ↔ English · Real-Time Neural Translation</div>
      </div>
      <div class="header-stats">
        <select id="targetLang" class="lang-select">
          <option value="ta" selected>Tamil</option>
          <option value="hi">Hindi</option>
          <option value="te">Telugu</option>
          <option value="kn">Kannada</option>
          <option value="ml">Malayalam</option>
        </select>
        <div class="stat-pill">
          <div class="dot" id="wsDot"></div>
          <span id="wsStatus">disconnected</span>
        </div>
        <div class="stat-pill" id="modelPill" style="display:none">
          <div class="dot alive"></div>
          <span>Pipeline Ready</span>
        </div>
      </div>
    </header>

    <!-- ── Subtitle Panel ── -->
    <div class="subtitle-panel" id="subtitlePanel">
      <div class="empty-state" id="emptyState">
        <div class="idle-viz">
          <div class="idle-bar"></div>
          <div class="idle-bar"></div>
          <div class="idle-bar"></div>
          <div class="idle-bar"></div>
          <div class="idle-bar"></div>
          <div class="idle-bar"></div>
          <div class="idle-bar"></div>
        </div>
        <div class="hint">Press the mic · Speak in Tamil or English</div>
      </div>
    </div>

    <!-- ── ECG Waveform ── -->
    <div class="ecg-section">
      <div class="ecg-label">VOX</div>
      <div class="ecg-wrapper">
        <canvas id="ecg"></canvas>
      </div>
      <div class="ecg-stats">
        <div class="ecg-stat silent" id="rmsDisplay">RMS <span>—</span></div>
        <div class="ecg-stat silent" id="dbDisplay">dB <span>—</span></div>
      </div>
    </div>

    <!-- ── Controls ── -->
    <div class="controls">
      <button class="btn-record" id="btnRecord" title="Click to record">
        <div class="glow-orb" id="btnIcon"></div>
      </button>
      <div class="info-col">
        <div class="info-primary" id="infoText">Ready — press to speak</div>
        <div class="info-secondary" id="infoSub">Auto-detects Tamil or English · 16 kHz PCM</div>
      </div>
      <div class="controls-right">
        <div class="audio-indicator" id="audioIndicator">
          <div class="play-dot"></div>
          <span id="audioLabel"></span>
        </div>
        <button class="btn-clear" id="btnClear">↺ Clear</button>
        <select id="envSelect" class="btn-clear" style="cursor:pointer; margin-left: 8px;">
          <option value="quiet"> Quiet Room</option>
          <option value="conference"> Conference</option>
          <option value="noisy"> Noisy</option>
        </select>
      </div>
    </div>

    <!-- ── Session Stats ── -->
    <div class="session-stats">
      <div class="stat-item">
        <span>Utterances</span>
        <span class="stat-val" id="statUtterances">0</span>
      </div>
      <div class="stat-item">
        <span>Languages</span>
        <span class="stat-val" id="statLangs">—</span>
      </div>
      <div class="stat-item">
        <span>Avg Latency</span>
        <span class="stat-val good" id="statAvgLatency">—</span>
      </div>
      <div class="stat-item">
        <span>Last</span>
        <span class="stat-val" id="statLastLatency">—</span>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ─────────────────────────────────────────────────────────
    // CONFIG
    // ─────────────────────────────────────────────────────────
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const host = window.location.host || 'localhost:8000';
    const WS_URL = `${protocol}//${host}/ws/translate`;
    const SAMPLE_RATE = 16000;
    //const CHUNK_MS 
    const CHUNK_MS = 2000;
    //const MIN_AUDIO_MS
    const MIN_AUDIO_MS = 300;

    // ─────────────────────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────────────────────
    let ws = null;
    let mediaStream = null;
    let audioCtx = null;
    let processor = null;
    let analyser = null;
    let recording = false;
    let pcmBuffer = [];
    let nextMsgIsAudio = false;
    let pendingMeta = null;
    let playbackCtx = null;
    let nextStartTime = 0;
    let playingNodes = 0;
    let activeUtterance = null;
    let ecgAnimId = null;
    let pingInterval = null;
    let currentRms = 0;

    let streamInterval = null;
    let currentChunk = [];

    // ── Session statistics ────────────────────────────────────
    let sessionUtterances = 0;
    let sessionLangsDetected = new Set();
    let sessionLatencies = [];
    let pendingConfidence = null;   // set by 'subtitle', consumed by 'done'


    // ECG state
    const ecgCanvas = document.getElementById('ecg');
    const ecgCtx = ecgCanvas.getContext('2d');
    let ecgW = 0, ecgH = 0;
    let ecgX = 0;
    let ecgHistory = [];   // circular buffer of {x, y} points
    let lastEcgY = 0;
    let ecgPhase = 0;    // for flatline animation when silent

    // DOM refs
    const targetLang = document.getElementById('targetLang');
    const wsDot = document.getElementById('wsDot');
    const wsStatus = document.getElementById('wsStatus');
    const modelPill = document.getElementById('modelPill');
    const panel = document.getElementById('subtitlePanel');
    let emptyState = document.getElementById('emptyState');
    const btnRecord = document.getElementById('btnRecord');
    const btnIcon = document.getElementById('btnIcon');
    const infoText = document.getElementById('infoText');
    const infoSub = document.getElementById('infoSub');
    const btnClear = document.getElementById('btnClear');
    const toastEl = document.getElementById('toast');
    const rmsDisplay = document.getElementById('rmsDisplay');
    const dbDisplay = document.getElementById('dbDisplay');
    const audioIndicator = document.getElementById('audioIndicator');
    const audioLabel = document.getElementById('audioLabel');

    // ─────────────────────────────────────────────────────────
    // RESIZE ECG CANVAS
    // ─────────────────────────────────────────────────────────
    function resizeEcg() {
      const rect = ecgCanvas.parentElement.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      ecgCanvas.width = rect.width * dpr;
      ecgCanvas.height = rect.height * dpr;
      ecgCtx.scale(dpr, dpr);
      ecgW = rect.width;
      ecgH = rect.height;
      lastEcgY = ecgH / 2;
      ecgHistory = [];
      ecgX = 0;
    }
    window.addEventListener('resize', resizeEcg);
    setTimeout(resizeEcg, 0);

    // ─────────────────────────────────────────────────────────
    // WEBSOCKET
    // ─────────────────────────────────────────────────────────
    function connect() {
      if (ws && ws.readyState <= 1) return;
      ws = new WebSocket(WS_URL);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        setWsStatus('alive', 'connected');
        modelPill.style.display = 'flex';
        infoText.textContent = 'Ready — press to speak';

        ws.send(JSON.stringify({ action: 'config', target_lang: targetLang.value }));
        ws.send(JSON.stringify({ action: 'config', environment: document.getElementById('envSelect').value }));

        targetLang.addEventListener('change', () => {
          if (ws?.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ action: 'config', target_lang: targetLang.value }));
          }
        });

        if (pingInterval) clearInterval(pingInterval);
        pingInterval = setInterval(() => {
          if (ws?.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'ping' }));
          }
        }, 15000);
      };

      ws.onclose = () => {
        setWsStatus('', 'disconnected');
        modelPill.style.display = 'none';
        if (pingInterval) { clearInterval(pingInterval); pingInterval = null; }
        awaitingResponse = false;
        setTimeout(connect, 3000);
      };

      ws.onerror = () => ws.close();

      ws.onmessage = (e) => {
        // Binary frame = audio PCM
        if (e.data instanceof ArrayBuffer) {
          if (pendingMeta) {
            const float32 = new Float32Array(e.data);
            enqueueAudio(float32, pendingMeta.sample_rate, pendingMeta.chunk_index, pendingMeta.total_chunks);
            pendingMeta = null;
          }
          return;
        }

        // JSON frame
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }
        handleMsg(msg);
      };
    }

    function handleMsg(msg) {
      switch (msg.type) {
        case 'subtitle':
          pendingConfidence = msg.confidence ?? null;
          createUtterance(msg);
          setWsStatus('proc', 'translating');
          infoText.textContent = 'Translating…';
          break;
        case 'audio':
          pendingMeta = msg;
          break;
        case 'done':
          // ── Update session stats ──────────────────────────────
          if (msg.latency_ms) {
            sessionLatencies.push(msg.latency_ms);
            const avg = Math.round(sessionLatencies.reduce((a, b) => a + b, 0) / sessionLatencies.length);
            const last = msg.latency_ms;
            document.getElementById('statLastLatency').textContent = `${last}ms`;
            const avgEl = document.getElementById('statAvgLatency');
            avgEl.textContent = `${avg}ms`;
            avgEl.className = 'stat-val ' + (avg < 1500 ? 'good' : avg < 3000 ? 'warn' : '');

            // Attach latency badge to the active utterance card
            if (activeUtterance) {
              const badgeRow = activeUtterance.querySelector('.utt-badges');
              if (badgeRow) {
                const lb = document.createElement('span');
                lb.className = 'utt-badge latency';
                lb.textContent = `⚡ ${last}ms`;
                badgeRow.appendChild(lb);
              }
            }
          }

          if (!recording) {
            setWsStatus('alive', 'connected');
            infoText.textContent = 'Ready — press to speak';
          } else {
            setWsStatus('rec', 'listening');
            infoText.textContent = 'Listening…';
          }
          if (activeUtterance) {
            activeUtterance.classList.remove('active');
            activeUtterance = null;
          }
          break;
        case 'error':
          showToast(msg.message || 'Server error');
          if (!recording) setWsStatus('alive', 'connected');
          break;
        case 'pong':
          break;
      }
    }

    // ─────────────────────────────────────────────────────────
    // SUBTITLE UI
    // ─────────────────────────────────────────────────────────
    function createUtterance(msg) {
      if (!msg.text || !msg.text.trim()) return;

      const words = msg.text.trim().split(/\s+/);
      // Basic hallucination filter
      if (words.length > 25 && new Set(words).size < 4) {
        showToast('Recognition anomaly detected — skipping');
        return;
      }

      if (emptyState) {
        emptyState.style.display = 'none';
        emptyState = null;
      }

      if (activeUtterance) activeUtterance.classList.remove('active');

      let tgtIso = 'en';
      if (msg.tgt_lang) {
        if (msg.tgt_lang.startsWith('tam')) tgtIso = 'ta';
        else if (msg.tgt_lang.startsWith('hin')) tgtIso = 'hi';
        else if (msg.tgt_lang.startsWith('tel')) tgtIso = 'te';
        else if (msg.tgt_lang.startsWith('kan')) tgtIso = 'kn';
        else if (msg.tgt_lang.startsWith('mal')) tgtIso = 'ml';
        else if (msg.tgt_lang.startsWith('eng')) tgtIso = 'en';
      }

      const lang = tgtIso;
      const srcCode = (msg.src_lang || '??').replace('_Taml','').replace('_Latn','').replace('_Deva','').replace('_Telu','').replace('_Knda','').replace('_Mlym','').toUpperCase();
      const tgtCode = lang.toUpperCase();
      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });

      // Confidence badge
      const conf = msg.confidence ?? pendingConfidence;
      let confBadgeHtml = '';
      if (conf !== null && conf !== undefined) {
        const pct = Math.round(conf * 100);
        const cls = pct >= 75 ? 'conf-high' : pct >= 50 ? 'conf-mid' : 'conf-low';
        confBadgeHtml = `<span class="utt-badge ${cls}">STT ${pct}%</span>`;
      }

      const el = document.createElement('div');
      el.className = 'utterance active';
      
      const safeSource = escHtml(msg.source_text || '');
      const uniqueId = Date.now() + Math.floor(Math.random()*1000);
      el.dataset.source = msg.source_text || '';
      el.dataset.translated = msg.text || '';
      el.dataset.srcLang = msg.src_lang || '';
      el.dataset.tgtLang = msg.tgt_lang || '';

      el.innerHTML = `
    <div class="bar ${lang}"></div>
    <div style="width: 100%">
      <div class="utterance-meta" style="display: flex; align-items: center;">
        <span class="lang-badge ${lang}">${tgtCode}</span>
        <span class="utterance-arrow">${srcCode} → ${tgtCode}</span>
        <span class="utterance-time">${time}</span>
        <button class="btn-report" title="Suggest Edit" onclick="toggleReportForm(this)">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>
        </button>
      </div>
      <div class="utterance-source">${safeSource}</div>
      <div class="utterance-text ${lang}"></div>
      <div class="utt-badges">${confBadgeHtml}</div>
      
      <div class="report-form-container" style="display: none;">
        <div style="display: flex; gap: 10px; font-size: 12px; margin-bottom: 4px; color: var(--text-muted)">
          <label><input type="radio" name="issue_${uniqueId}" value="stt" checked> Bad STT</label>
          <label><input type="radio" name="issue_${uniqueId}" value="translation"> Bad Translation</label>
        </div>
        <input type="text" class="report-input" placeholder="Suggest an edit...">
        <div class="report-actions">
          <button class="btn-submit-report" onclick="submitReport(this)">Submit Report</button>
          <button class="btn-cancel-report" onclick="toggleReportForm(this)">Cancel</button>
        </div>
      </div>
    </div>
  `;

      // Keep last 50
      const all = panel.querySelectorAll('.utterance');
      if (all.length >= 50) all[0].remove();

      panel.appendChild(el);
      el.scrollIntoView({ behavior: 'smooth', block: 'end' });
      activeUtterance = el;

      // ── Update session stats ──────────────────────────────────
      sessionUtterances++;
      document.getElementById('statUtterances').textContent = sessionUtterances;

      const srcIso = (msg.src_lang || '').split('_')[0].toLowerCase();
      if (srcIso) sessionLangsDetected.add(srcIso);
      const langNames = { ta:'Tamil', en:'English', hi:'Hindi', te:'Telugu', kn:'Kannada', ml:'Malayalam' };
      const langList = [...sessionLangsDetected].map(l => langNames[l] || l.toUpperCase()).join(', ');
      document.getElementById('statLangs').textContent = langList || '—';

      // Animate words in
      const textEl = el.querySelector('.utterance-text');
      let i = 0;
      const timer = setInterval(() => {
        if (i >= words.length) { clearInterval(timer); return; }
        const sp = document.createElement('span');
        sp.className = 'chunk-token';
        sp.textContent = (i > 0 ? ' ' : '') + words[i];
        textEl.appendChild(sp);
        i++;
      }, 55);
    }

    function escHtml(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ─────────────────────────────────────────────────────────
    // AUDIO PLAYBACK
    // ─────────────────────────────────────────────────────────
    function enqueueAudio(float32, sampleRate, chunkIndex, totalChunks) {
      if (!playbackCtx) {
        playbackCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate });
      } else if (playbackCtx.state === 'suspended') {
        playbackCtx.resume();
      }

      const buf = playbackCtx.createBuffer(1, float32.length, sampleRate);
      buf.getChannelData(0).set(float32);

      const src = playbackCtx.createBufferSource();
      src.buffer = buf;
      src.connect(playbackCtx.destination);

      const now = playbackCtx.currentTime;
      if (nextStartTime < now) nextStartTime = now + 0.04;
      src.start(nextStartTime);
      nextStartTime += buf.duration;

      playingNodes++;
      updateAudioIndicator();

      src.onended = () => {
        playingNodes = Math.max(0, playingNodes - 1);
        updateAudioIndicator();
      };
    }

    function updateAudioIndicator() {
      if (playingNodes > 0) {
        audioIndicator.classList.add('playing');
        audioLabel.textContent = `${playingNodes} chunk${playingNodes > 1 ? 's' : ''}`;
      } else {
        audioIndicator.classList.remove('playing');
        audioLabel.textContent = '';
      }
    }

    // ─────────────────────────────────────────────────────────
    // MICROPHONE CAPTURE
    // ─────────────────────────────────────────────────────────
    async function startRecording() {
      if (recording) return;

      try {
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
      } catch {
        showToast('Microphone access denied — check browser permissions');
        return;
      }

      audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: SAMPLE_RATE });
      const source = audioCtx.createMediaStreamSource(mediaStream);

      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 512;
      analyser.smoothingTimeConstant = 0.5;
      source.connect(analyser);

      processor = audioCtx.createScriptProcessor(4096, 1, 1);
      source.connect(processor);
      processor.connect(audioCtx.destination);

      // Just accumulate — no silence detection, no buffering logic
      processor.onaudioprocess = (e) => {
        const samples = e.inputBuffer.getChannelData(0);
        currentChunk.push(new Float32Array(samples));
      };

      // Send every 250ms unconditionally — backend VAD decides utterance boundaries
      streamInterval = setInterval(() => {
        if (!recording || !ws || ws.readyState !== WebSocket.OPEN) return;
        if (currentChunk.length === 0) return;

        const total = currentChunk.reduce((s, a) => s + a.length, 0);
        const merged = new Float32Array(total);
        let offset = 0;
        for (const c of currentChunk) { merged.set(c, offset); offset += c.length; }
        currentChunk = [];

        ws.send(merged.buffer);
      }, 250);

      recording = true;
      btnRecord.classList.add('recording');
      setWsStatus('rec', 'listening');
      infoText.textContent = 'Listening…';
      infoSub.textContent = 'Speak naturally · Tamil or English';

      startEcg();
    }

    function stopRecording() {
      if (!recording) return;
      recording = false;

      clearInterval(streamInterval);
      streamInterval = null;
      currentChunk = [];

      if (processor) { processor.disconnect(); processor = null; }
      if (analyser) { analyser.disconnect(); analyser = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; }
      if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }

      btnRecord.classList.remove('recording');
      setWsStatus('alive', 'connected');
      infoText.textContent = 'Ready — press to speak';
      infoSub.textContent = 'Auto-detects Tamil or English · 16 kHz PCM';

      stopEcg();
    }

    // ─────────────────────────────────────────────────────────
    // ECG / HEARTBEAT WAVEFORM
    // ─────────────────────────────────────────────────────────
    // True ECG-style: draws a rolling line with sharp QRS spikes
    // proportional to voice amplitude — like a cardiac monitor.
    // ─────────────────────────────────────────────────────────

    let ecgRunning = false;
    const ECG_SPEED = 2.5;   // px per frame
    const ECG_FLATNOISE = 0.8;   // subtle flatline jitter (px)

    function startEcg() {
      ecgRunning = true;
      ecgLoop();
    }

    function stopEcg() {
      ecgRunning = false;
      cancelAnimationFrame(ecgAnimId);
      // Draw a fading flatline
      fadeToFlatline();
    }

    function ecgLoop() {
      if (!ecgRunning) return;
      drawEcgFrame();
      ecgAnimId = requestAnimationFrame(ecgLoop);
    }

    function drawEcgFrame() {
      if (ecgW === 0) return;

      // ── Sample audio amplitude ──────────────────────────────
      let rms = 0;
      let dbVal = -Infinity;

      if (analyser) {
        const buf = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(buf);
        let sum = 0;
        for (let i = 0; i < buf.length; i++) {
          const v = (buf[i] - 128) / 128;
          sum += v * v;
        }
        rms = Math.sqrt(sum / buf.length);
        currentRms = rms;
        dbVal = rms > 0 ? 20 * Math.log10(rms) : -Infinity;
      }

      // Update stats display
      const isSilent = rms < 0.008;
      rmsDisplay.className = 'ecg-stat' + (isSilent ? ' silent' : '');
      rmsDisplay.innerHTML = `RMS <span>${rms > 0 ? rms.toFixed(3) : '—'}</span>`;
      dbDisplay.className = 'ecg-stat' + (isSilent ? ' silent' : '');
      dbDisplay.innerHTML = `dB <span>${isFinite(dbVal) ? dbVal.toFixed(1) : '—'}</span>`;

      // ── Erase gap ahead of playhead ─────────────────────────
      const gapW = 24;
      ecgCtx.clearRect(ecgX, 0, gapW, ecgH);

      // Re-draw the vertical edge (scan line effect)
      ecgCtx.fillStyle = 'rgba(13,15,20,0.92)';
      ecgCtx.fillRect(ecgX, 0, 2, ecgH);

      // ── Compute target Y ────────────────────────────────────
      ecgPhase += 0.05;
      let targetY;

      if (isSilent) {
        // Flatline with tiny biological-style noise
        targetY = (ecgH / 2) + Math.sin(ecgPhase * 0.3) * ECG_FLATNOISE;
      } else {
        // QRS-style spike: use RMS to drive amplitude
        // Add a sharp triangular "R-wave" shape
        const amp = Math.min(rms * ecgH * 3.5, ecgH * 0.44);
        const wave = Math.sin(ecgPhase * 6.0);          // fast oscillation
        const spike = Math.exp(-Math.pow(ecgPhase % (2 * Math.PI) - Math.PI, 2) * 1.2); // Gaussian
        targetY = (ecgH / 2) - (wave * amp * 0.5) - (spike * amp * 0.8);
        targetY = Math.max(3, Math.min(ecgH - 3, targetY));
      }

      // Smooth interpolation toward target
      lastEcgY = lastEcgY + (targetY - lastEcgY) * 0.35;

      // ── Draw the line segment ───────────────────────────────
      const color = isSilent
        ? 'rgba(0,255,157,0.25)'
        : `rgba(0,255,157,${Math.min(0.9, 0.45 + rms * 3)})`;

      const glowColor = isSilent
        ? 'rgba(0,255,157,0.1)'
        : `rgba(0,255,157,${Math.min(0.6, 0.2 + rms * 2)})`;

      // Glow pass
      ecgCtx.shadowBlur = isSilent ? 3 : 10 + rms * 20;
      ecgCtx.shadowColor = glowColor;
      ecgCtx.strokeStyle = color;
      ecgCtx.lineWidth = isSilent ? 1 : 1.5;
      ecgCtx.lineCap = 'round';

      ecgCtx.beginPath();
      const prevX = ecgX === 0 ? 0 : ecgX - ECG_SPEED;
      ecgCtx.moveTo(prevX, ecgHistory.length > 0 ? ecgHistory[ecgHistory.length - 1].y : ecgH / 2);
      ecgCtx.lineTo(ecgX, lastEcgY);
      ecgCtx.stroke();

      // Playhead dot
      ecgCtx.shadowBlur = 12;
      ecgCtx.shadowColor = '#00ff9d';
      ecgCtx.fillStyle = isSilent ? 'rgba(0,255,157,0.4)' : '#ffffff';
      ecgCtx.beginPath();
      ecgCtx.arc(ecgX, lastEcgY, isSilent ? 1.5 : 2.5, 0, Math.PI * 2);
      ecgCtx.fill();

      ecgCtx.shadowBlur = 0;

      // Store history
      ecgHistory.push({ x: ecgX, y: lastEcgY });
      if (ecgHistory.length > ecgW) ecgHistory.shift();

      // Advance
      ecgX += ECG_SPEED;
      if (ecgX >= ecgW) ecgX = 0;
    }

    function fadeToFlatline() {
      // Reset stats
      rmsDisplay.className = 'ecg-stat silent';
      rmsDisplay.innerHTML = 'RMS <span>—</span>';
      dbDisplay.className = 'ecg-stat silent';
      dbDisplay.innerHTML = 'dB <span>—</span>';

      // Fade out the canvas
      let alpha = 1.0;
      function fade() {
        ecgCtx.fillStyle = `rgba(13,15,20,0.12)`;
        ecgCtx.fillRect(0, 0, ecgW, ecgH);
        alpha -= 0.04;
        if (alpha > 0) requestAnimationFrame(fade);
        else {
          ecgCtx.clearRect(0, 0, ecgW, ecgH);
          lastEcgY = ecgH / 2;
          ecgX = 0;
          ecgHistory = [];
        }
      }
      requestAnimationFrame(fade);
    }

    // ─────────────────────────────────────────────────────────
    // UI HELPERS
    // ─────────────────────────────────────────────────────────
    function setWsStatus(state, label) {
      wsDot.className = 'dot ' + (
        state === 'alive' ? 'alive' :
          state === 'rec' ? 'rec' :
            state === 'proc' ? 'proc' : ''
      );
      wsStatus.textContent = label;
    }

    let toastTimer = null;
    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('show'), 4500);
    }

    // ─────────────────────────────────────────────────────────
    // BUTTON EVENTS
    // ─────────────────────────────────────────────────────────
    btnRecord.addEventListener('click', () => {
      if (recording) stopRecording();
      else startRecording();
    });

    btnClear.addEventListener('click', () => {
      panel.querySelectorAll('.utterance').forEach(el => el.remove());
      const idle = document.createElement('div');
      idle.className = 'empty-state';
      idle.id = 'emptyState';
      idle.innerHTML = `
    <div class="idle-viz">
      <div class="idle-bar"></div><div class="idle-bar"></div>
      <div class="idle-bar"></div><div class="idle-bar"></div>
      <div class="idle-bar"></div><div class="idle-bar"></div>
      <div class="idle-bar"></div>
    </div>
    <div class="hint">Press the mic · Speak in Tamil or English</div>
  `;
      panel.appendChild(idle);
      emptyState = idle;

      if (playbackCtx) { playbackCtx.close(); playbackCtx = null; }
      nextStartTime = 0;
      playingNodes = 0;
      updateAudioIndicator();

      // Reset session stats
      sessionUtterances = 0;
      sessionLangsDetected = new Set();
      sessionLatencies = [];
      pendingConfidence = null;
      document.getElementById('statUtterances').textContent = '0';
      document.getElementById('statLangs').textContent = '—';
      document.getElementById('statAvgLatency').textContent = '—';
      document.getElementById('statAvgLatency').className = 'stat-val good';
      document.getElementById('statLastLatency').textContent = '—';
    });

    document.getElementById('envSelect').addEventListener('change', (e) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
          action: 'config',
          environment: e.target.value
        }));
        console.log(`[Frontend] Environment set to: ${e.target.value}`);
      }
    });

    function toggleReportForm(btn) {
      const container = btn.closest('.utterance').querySelector('.report-form-container');
      container.style.display = container.style.display === 'none' ? 'flex' : 'none';
    }

    async function submitReport(btn) {
      const utteranceEl = btn.closest('.utterance');
      const container = utteranceEl.querySelector('.report-form-container');
      const issueType = container.querySelector('input[type="radio"]:checked').value;
      const correction = container.querySelector('.report-input').value;
      
      const payload = {
        src_lang: utteranceEl.dataset.srcLang,
        tgt_lang: utteranceEl.dataset.tgtLang,
        source_text: utteranceEl.dataset.source,
        translated_text: utteranceEl.dataset.translated,
        issue_type: issueType,
        correction: correction
      };

      try {
        await fetch('/api/report', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        showToast('Report submitted! Thank you.');
        container.style.display = 'none';
        utteranceEl.querySelector('.btn-report').style.color = 'var(--success, #00e676)';
      } catch (err) {
        showToast('Failed to submit report');
      }
    }

    // ─────────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────────
    connect();
  </script>
</body>

</html>
