services:
  db:
    image: postgres:16-alpine
    container_name: ispeak_db
    restart: unless-stopped

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: realtime-speech-translator:latest

    build:
      context: .
      dockerfile: Dockerfile

    container_name: ispeak_app

    restart: unless-stopped

    depends_on:
      db:
        condition: service_healthy

    env_file:
      - .env

    environment:
      POSTGRES_HOST: db

    ports:
      - "8000:8000"

    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./logs:/app/logs
      - ./temp_audio:/app/temp_audio
      - ./secure_vault:/app/secure_vault
      - ./server_public.key:/app/server_public.key:ro

    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
