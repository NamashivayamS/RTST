services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ispeak_db
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${MSSQL_PASSWORD}
    ports:
      - "127.0.0.1:1434:1433"
    volumes:
      - db_data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '${MSSQL_PASSWORD}' -C -Q 'SELECT 1'" ]
      interval: 10s
      timeout: 5s
      retries: 10

  db-init:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: ispeak_db_init
    depends_on:
      db:
        condition: service_healthy
    entrypoint:
      - /bin/bash
      - -c
      - |
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "$$MSSQL_PASSWORD" -C -Q "IF NOT EXISTS (SELECT name FROM sys.databases WHERE name = N'$$MSSQL_DB') CREATE DATABASE [$$MSSQL_DB];"
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "$$MSSQL_PASSWORD" -C -Q "IF NOT EXISTS (SELECT * FROM sys.server_principals WHERE name = '$$MSSQL_USER') CREATE LOGIN [$$MSSQL_USER] WITH PASSWORD = '$$MSSQL_PASSWORD', DEFAULT_DATABASE = [$$MSSQL_DB], CHECK_EXPIRATION = OFF, CHECK_POLICY = OFF;"
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "$$MSSQL_PASSWORD" -C -d "$$MSSQL_DB" -Q "IF NOT EXISTS (SELECT * FROM sys.database_principals WHERE name = '$$MSSQL_USER') BEGIN CREATE USER [$$MSSQL_USER] FOR LOGIN [$$MSSQL_USER]; ALTER ROLE [db_owner] ADD MEMBER [$$MSSQL_USER]; END"
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "$$MSSQL_PASSWORD" -C -d "$$MSSQL_DB" -i /tmp/schema.sql
        /opt/mssql-tools18/bin/sqlcmd -S db -U sa -P "$$MSSQL_PASSWORD" -C -d "$$MSSQL_DB" -Q "IF NOT EXISTS (SELECT 1 FROM departments WHERE id = '$$DEFAULT_DEPARTMENT_ID') INSERT INTO departments (id, name) VALUES ('$$DEFAULT_DEPARTMENT_ID', 'Default Department');"
        echo "Database schema applied successfully!"
    volumes:
      - ./database/schema.sql:/tmp/schema.sql
    environment:
      MSSQL_PASSWORD: ${MSSQL_PASSWORD}
      MSSQL_USER: ${MSSQL_USER}
      MSSQL_DB: ${MSSQL_DB}
      DEFAULT_DEPARTMENT_ID: ${DEFAULT_DEPARTMENT_ID}

  app:
    image: realtime-speech-translator:latest
    container_name: ispeak_app
    restart: unless-stopped
    #gpus: all
    depends_on:
      db:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      MSSQL_HOST: db
    ports:
      - "127.0.0.1:8010:8000"
    volumes:
      - ./logs:/app/logs
      - ./temp_audio:/app/temp_audio
      - ./secure_vault:/app/secure_vault
      - ./server_public.key:/app/server_public.key:ro
    logging:
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
